  "@aws-sdk/signature-v4a": 3.1077.0
  "@cspell/dict-people-names": 1.1.16
  "@date-fns/tz": 1.5.0
  "@middy/core": 7.7.0
  "@types/aws-lambda": 8.10.162
  "@types/ejs": 3.1.5
  "@types/node": 25.9.4
  aws-cdk: 2.1129.0
  aws-cdk-github-oidc: 4.2.5
  aws-cdk-lib: 2.260.0
  cdk-nag: 3.0.1
  constructs: 10.6.0
  cron-parser: 5.6.1
  cspell: 10.0.1
  date-fns: 4.4.0
  ejs: 6.0.1
  execa: 9.6.1
  markdownlint: 0.41.0
  markdownlint-cli2: 0.23.0
  npm-run-all2: 9.0.2
