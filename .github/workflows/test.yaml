name: test

on:
  pull_request:
    branches:
      - main

jobs:
  # Add pull_request jobs to workflow-call-test.yaml so status-check can cover them.
  test:
    uses: ./.github/workflows/workflow-call-test.yaml
    permissions:
      actions: read
      contents: read
      id-token: write
      pull-requests: write

  status-check:
    permissions: {}
    needs:
      - test
    if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    runs-on: ubuntu-slim
    steps:
      - run: exit 1
    timeout-minutes: 5
