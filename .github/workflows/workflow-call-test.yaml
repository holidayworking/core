name: test (workflow call)

on:
  workflow_call:

jobs:
  vp-check:
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          cache: true
      - run: vp install
      - run: vp check
      - run: vp run lint
    timeout-minutes: 10

  nix-check:
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - run: nix flake check --all-systems --print-build-logs
    timeout-minutes: 10

  changes:
    permissions:
      pull-requests: read
    needs:
      - vp-check
      - nix-check
    runs-on: ubuntu-slim
    outputs:
      radicast: ${{ steps.filter.outputs.radicast }}
      aws-infrastructure: ${{ steps.filter.outputs.aws-infrastructure }}
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            radicast:
              - "apps/radicast/**"
              - .github/workflows/test.yaml
              - .github/workflows/workflow-call-test.yaml
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - tsconfig.json
            aws-infrastructure:
              - "infrastructures/aws/**"
              - .github/workflows/test.yaml
              - .github/workflows/workflow-call-test.yaml
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - tsconfig.json
            nix:
              - "**/*.nix"
              - .github/workflows/test.yaml
              - .github/workflows/workflow-call-test.yaml
              - flake.lock
    timeout-minutes: 5

  vp-test:
    permissions:
      contents: read
    needs:
      - changes
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
      - uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5.3.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          cache: true
      - run: vp install
      - run: vp test
    timeout-minutes: 10

  radicast-diff:
    permissions:
      contents: read
      id-token: write
    needs:
      - changes
      - vp-test
    if: ${{ needs.changes.outputs.radicast == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
      - uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5.3.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          cache: true
      - run: vp install
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::445411728232:role/github-actions
          aws-region: ap-northeast-1
      - run: vp exec --filter radicast cdk synth
      - run: vp exec --filter radicast cdk diff --all
    timeout-minutes: 10

  aws-infrastructure-diff:
    permissions:
      contents: read
      id-token: write
    needs:
      - changes
      - vp-test
    if: ${{ needs.changes.outputs.aws-infrastructure == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          cache: true
      - run: vp install
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::445411728232:role/github-actions
          aws-region: ap-northeast-1
      - run: vp exec --filter @infrastructures/aws cdk synth
      - run: vp exec --filter @infrastructures/aws cdk diff --all
    timeout-minutes: 10

  nix-diff:
    permissions:
      contents: read
    needs:
      - changes
    if: ${{ needs.changes.outputs.nix == 'true' }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "true"
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - uses: natsukium/nix-diff-action@4091452e4c7b3c7ea4ecbaec84be7f0066d810d7 # v1.1.1
        with:
          mode: diff-only
          attributes: |
            - displayName: ${{ matrix.host }}
              attribute: ${{ matrix.attribute }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - host: aries
            attribute: darwinConfigurations.aries.system
            runner: macos-26
          - host: gemini
            attribute: nixosConfigurations.gemini.config.system.build.toplevel
            runner: ubuntu-24.04-arm
          - host: devShells.aarch64-darwin.default
            attribute: devShells.aarch64-darwin.default
            runner: macos-26
          - host: devShells.aarch64-linux.default
            attribute: devShells.aarch64-linux.default
            runner: ubuntu-24.04-arm

  nix-diff-comment:
    permissions:
      actions: read
      pull-requests: write
    needs:
      - nix-diff
    runs-on: ubuntu-slim
    steps:
      - uses: natsukium/nix-diff-action@4091452e4c7b3c7ea4ecbaec84be7f0066d810d7 # v1.1.1
        with:
          mode: comment-only
    timeout-minutes: 5
