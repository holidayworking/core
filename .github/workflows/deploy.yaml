name: deploy

on:
  push:
    branches:
      - main

jobs:
  changes:
    permissions:
      pull-requests: read
    runs-on: ubuntu-slim
    outputs:
      hugo: ${{ steps.filter.outputs.hugo }}
      radicast: ${{ steps.filter.outputs.radicast }}
      zenn: ${{ steps.filter.outputs.zenn }}
      aws-infrastructure: ${{ steps.filter.outputs.aws-infrastructure }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
          fetch-depth: 20
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            hugo:
              - "apps/hugo/**"
              - .github/workflows/deploy.yaml
            radicast:
              - "apps/radicast/**"
              - .github/workflows/deploy.yaml
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - tsconfig.json
            zenn:
              - "apps/zenn/**"
              - .github/workflows/deploy.yaml
            aws-infrastructure:
              - "infrastructures/aws/**"
              - .github/workflows/deploy.yaml
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - tsconfig.json
    timeout-minutes: 5

  hugo:
    permissions:
      contents: read
      id-token: write
      pages: write
    needs:
      - changes
    if: ${{ needs.changes.outputs.hugo == 'true' }}
    runs-on: ubuntu-24.04-arm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
      - run: nix build '.?submodules=1#build-hugo'
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./result
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
    timeout-minutes: 10

  radicast:
    permissions:
      contents: write
      id-token: write
    needs:
      - changes
    if: ${{ needs.changes.outputs.radicast == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
      - uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23 # v5.2.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          cache: true
      - run: vp install
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::445411728232:role/github-actions
          aws-region: ap-northeast-1
      - run: vp exec --filter radicast cdk deploy --all --require-approval never
    timeout-minutes: 10

  zenn:
    permissions:
      contents: write
    needs:
      - changes
    if: ${{ needs.changes.outputs.zenn == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: publish/zenn
          publish_dir: ./apps/zenn
          force_orphan: true
    timeout-minutes: 10

  aws-infrastructure:
    permissions:
      contents: write
      id-token: write
    needs:
      - changes
    if: ${{ needs.changes.outputs.aws-infrastructure == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          cache: true
      - run: vp install
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::445411728232:role/github-actions
          aws-region: ap-northeast-1
      - run: vp exec --filter @infrastructures/aws cdk deploy --all --require-approval never
    timeout-minutes: 10
