name: deploy

on:
  push:
    branches:
      - main

jobs:
  changes:
    permissions:
      pull-requests: read
    runs-on: ubuntu-slim
    outputs:
      hugo: ${{ steps.filter.outputs.hugo }}
      radicast: ${{ steps.filter.outputs.radicast }}
      zenn: ${{ steps.filter.outputs.zenn }}
      aws-infrastructure: ${{ steps.filter.outputs.aws-infrastructure }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
          fetch-depth: 20
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            hugo:
              - "apps/hugo/**"
              - .github/workflows/deploy.yaml
            radicast:
              - "apps/radicast/**"
              - .github/workflows/deploy.yaml
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - tsconfig.json
            zenn:
              - "apps/zenn/**"
              - .github/workflows/deploy.yaml
            aws-infrastructure:
              - "infrastructures/aws/**"
              - .github/workflows/deploy.yaml
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - tsconfig.json
    timeout-minutes: 5

  hugo:
    permissions:
      contents: read
      id-token: write
      pages: write
    needs:
      - changes
    if: ${{ needs.changes.outputs.hugo == 'true' }}
    runs-on: ubuntu-24.04-arm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
      - run: nix build '.?submodules=1#build-hugo'
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./result
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
    timeout-minutes: 10

  radicast:
    permissions:
      contents: write
      id-token: write
    needs:
      - changes
    if: ${{ needs.changes.outputs.radicast == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
      - uses: voidzero-dev/setup-vp@56918a6d0c629c55ae8b88826a7d47fda85769ee # v1.9.0
        with:
          cache: true
      - run: vp install
      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::766612536658:role/github-actions-role
          aws-region: ap-northeast-1
      - run: vp exec --filter radicast cdk deploy --all --require-approval never
    timeout-minutes: 10

  zenn:
    permissions:
      contents: write
    needs:
      - changes
    if: ${{ needs.changes.outputs.zenn == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
      - uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: publish/zenn
          publish_dir: ./apps/zenn
          force_orphan: true
    timeout-minutes: 10

  aws-infrastructure:
    permissions:
      contents: write
      id-token: write
    needs:
      - changes
    if: ${{ needs.changes.outputs.aws-infrastructure == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
      - uses: voidzero-dev/setup-vp@56918a6d0c629c55ae8b88826a7d47fda85769ee # v1.9.0
        with:
          cache: true
      - run: vp install
      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::766612536658:role/github-actions-role
          aws-region: ap-northeast-1
      - run: vp exec --filter @infrastructures/aws cdk deploy --all --require-approval never
    timeout-minutes: 10
