images:
  - location: ./result/nixos-lima.qcow2
    arch: "aarch64"
cpus: 4
memory: 12GiB
disk: 100GiB
mounts:
  - location: "~"
    writable: true
  - location: /private
    writable: true
containerd:
  user: false
user:
  uid: 1000
vmOpts:
  rosetta:
    enabled: true
    binfmt: true
networks:
  - vzNAT: true
portForwards:
  - guestSocket: "/var/run/docker.sock"
    hostSocket: "{{.Dir}}/sock/docker.sock"
